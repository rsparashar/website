  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dark {\n      --bg: #111010;\n      --ink: #e8e2d6;\n      --dim: #706a5e;\n      --accent: #c4522a;\n      --rule: #242018;\n    }\n    .wrap { max-width: 440px; margin: 0 auto; }\n    a { color: inherit; text-decoration: none; }\n\n    /* header */\n    header {\n      padding: 52px 0 0;\n      display: flex;\n      justify-content: space-between;\n      align-items: baseline;\n    }\n    .site-name {\n      font-size: 0.9rem;\n      font-family: 'DM Mono', monospace;\n      font-weight: 300;\n      letter-spacing: 0.04em;\n      color: var(--dim);\n    }\n    .moon-btn {\n      background: none; border: none; cursor: pointer;\n      color: var(--dim); padding: 0; line-height: 1;\n      transition: color 0.2s;\n    }\n    .moon-btn:hover { color: var(--accent); }\n\n    /* intro */\n    .intro { padding: 72px 0 52px; }\n    .intro h1 {\n      font-size: clamp(2.4rem, 7vw, 3.4rem);\n      font-weight: 400;\n      line-height: 1.1;\n      margin-bottom: 28px;\n      letter-spacing: -0.015em;\n    }\n    .intro p {\n      font-size: 1.05rem;\n      color: var(--dim);\n      max-width: 340px;\n      line-height: 1.75;\n    }\n\n    /* links */\n    .links {\n      padding: 36px 0 0;\n      display: flex;\n      align-items: center;\n      gap: 18px;\n      flex-wrap: wrap;\n    }\n    .links a {\n      font-size: 0.78rem;\n      font-family: 'DM Mono', monospace;\n      font-weight: 300;\n      letter-spacing: 0.04em;\n      color: var(--dim);\n      transition: color 0.2s;\n    }\n    .links a:hover { color: var(--ink); }\n    .links .spotify-icon { display: flex; align-items: center; }\n    .links .sep { color: var(--rule); font-size: 0.7rem; }\n\n    /* sections */\n    section { padding: 64px 0 0; }\n    section:last-of-type { padding-bottom: 64px; }\n\n    .section-label {\n      font-size: 0.68rem;\n      font-family: 'DM Mono', monospace;\n      font-weight: 300;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--dim);\n      margin-bottom: 32px;\n      opacity: 0.7;\n    }\n\n    /* writing */\n    .writing-item {\n      padding: 24px 0;\n      border-top: 1px solid var(--rule);\n    }\n    .writing-item:last-child { border-bottom: 1px solid var(--rule); }\n    .writing-item a { display: block; transition: opacity 0.18s; }\n    .writing-item a:hover { opacity: 0.5; }\n    .writing-item .title { font-size: 1.1rem; margin-bottom: 3px; }\n    .writing-item .sub {\n      font-size: 0.85rem;\n      color: var(--dim);\n      font-style: italic;\n      margin-bottom: 8px;\n    }\n    .writing-item .desc {\n      font-size: 0.85rem;\n      color: var(--dim);\n      line-height: 1.65;\n    }\n\n    /* work */\n    .work-item {\n      padding: 18px 0;\n      border-top: 1px solid var(--rule);\n      display: grid;\n      grid-template-columns: 62px 1fr;\n      gap: 18px;\n    }\n    .work-item:last-child { border-bottom: 1px solid var(--rule); }\n    .work-year {\n      font-family: 'DM Mono', monospace;\n      font-size: 0.68rem;\n      font-weight: 300;\n      color: var(--dim);\n      padding-top: 3px;\n      opacity: 0.75;\n    }\n    .work-co { font-size: 1rem; margin-bottom: 2px; }\n    .work-role {\n      font-size: 0.82rem;\n      color: var(--dim);\n      font-style: italic;\n      margin-bottom: 6px;\n    }\n    .work-note {\n      font-size: 0.82rem;\n      color: var(--dim);\n      line-height: 1.6;\n    }\n\n    /* footer */\n    footer {\n      border-top: 1px solid var(--rule);\n      padding: 24px 0 52px;\n      font-family: 'DM Mono', monospace;\n      font-size: 0.68rem;\n      font-weight: 300;\n      letter-spacing: 0.1em;\n      color: var(--dim);\n      display: flex;\n      gap: 10px;\n      align-items: center;\n    }\n    body.dark footer {\n      color: var(--ink);\n      opacity: 0.6;\n    }\n      .work-item { grid-template-columns: 50px 1fr; gap: 12px; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <header>\n    <button class=\"moon-btn\" id=\"dark-toggle\" aria-label=\"Toggle dark mode\" style=\"margin-left:auto;display:block\">\n      <svg id=\"moon-icon\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\">\n        <path d=\"M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z\"><\u002Fpath>\n      <\u002Fsvg>\n      <svg id=\"sun-icon\" width=\"36\" height=\"30\" viewBox=\"0 0 60 50\" style=\"display:none\" fill=\"currentColor\">\n        <!-- large star top-left -->\n        <polygon points=\"14,0 16.8,9.5 26,9.5 18.6,15.4 21.4,24.8 14,18.8 6.6,24.8 9.4,15.4 2,9.5 11.2,9.5\"><\u002Fpolygon>\n        <!-- medium star top-right -->\n        <polygon points=\"44,4 46.2,11.5 53.5,11.5 47.6,16.2 49.8,23.6 44,18.8 38.2,23.6 40.4,16.2 34.5,11.5 41.8,11.5\"><\u002Fpolygon>\n        <!-- small star bottom-center -->\n        <polygon points=\"28,28 29.6,33.5 35,33.5 30.7,36.8 32.3,42.2 28,38.8 23.7,42.2 25.3,36.8 21,33.5 26.4,33.5\"><\u002Fpolygon>\n      <\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <div class=\"intro\">\n    <h1><em>Radhika.<\u002Fem><\u002Fh1>\n    <p>\n      I'm interested in the space between things —<br>\n      countries, disciplines, identities.<br>\n      Most of what I do is an attempt to make sense of that.<br>\n      <span id=\"tagline-writing\" onclick=\"openSection('writing')\" style=\"cursor:pointer;border-bottom:1px solid var(--dim);transition:color 0.2s;color:inherit\" onmouseover=\"this.style.color='var(--accent)'\" onmouseout=\"this.style.color='inherit'\">Writing<\u002Fspan> brings me joy, <span id=\"tagline-work\" onclick=\"openSection('work')\" style=\"cursor:pointer;border-bottom:1px solid var(--dim);transition:color 0.2s;color:inherit\" onmouseover=\"this.style.color='var(--accent)'\" onmouseout=\"this.style.color='inherit'\">work<\u002Fspan> feeds my purpose.\n    <\u002Fp>\n\n    <div class=\"links\">\n      <a href=\"mailto:r.s.parashar@gmail.com\">Email<\u002Fa>\n      <span class=\"sep\">·<\u002Fspan>\n      <a href=\"https://twitter.com/thedevidasi\" target=\"_blank\" rel=\"noopener\">X<\u002Fa>\n      <span class=\"sep\">·<\u002Fspan>\n      <a href=\"https://www.linkedin.com/in/radhikaparashar/\" target=\"_blank\" rel=\"noopener\">LinkedIn<\u002Fa>\n      <span class=\"sep\">·<\u002Fspan>\n      <!-- Spotify as icon only -->\n      <a href=\"https://open.spotify.com/user/1246415177\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"spotify-icon\" aria-label=\"Spotify\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"color:var(--dim); transition:color 0.2s\" onmouseover=\"this.style.color='#1DB954'\" onmouseout=\"this.style.color='var(--dim)'\">\n          <path d=\"M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <section id=\"writing\" style=\"padding-top:64px\">\n\n    <div id=\"writing-body\" style=\"display:none\">\n    <div class=\"writing-item\">\n      <a href=\"https://salesenablement.substack.com\" target=\"_blank\" rel=\"noopener\">\n        <div class=\"title\">Sales Enablement<\u002Fdiv>\n        <div class=\"sub\">Practical thinking for revenue teams<\u002Fdiv>\n        <div class=\"desc\">Field notes on my observations and learnings in GTM and enablement.<\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n    <div class=\"writing-item\">\n      <a href=\"https://radhikaparashar.substack.com\" target=\"_blank\" rel=\"noopener\">\n        <div class=\"title\">Vilayat Dispatch<\u002Fdiv>\n        <div class=\"sub\">Musings on place, identity, life<\u002Fdiv>\n        <div class=\"desc\">Personal essays on what it means to be from everywhere and nowhere, as I navigate home.<\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"work\" style=\"padding-top:64px\">\n\n    <div id=\"work-body\" style=\"display:none\">\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2022–<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">Strategic Advisor<\u002Fdiv>\n        <div class=\"work-role\">AI, SaaS, Design Tools<\u002Fdiv>\n        <div class=\"work-note\">GTM architecture, positioning, and international market entry for early-stage and scaling companies.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2025<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">Arcol<\u002Fdiv>\n        <div class=\"work-role\">Head of Marketing<\u002Fdiv>\n        <div class=\"work-note\">Owned marketing, narrative, and GTM for a Series A architectural design platform — from first principles to practitioner community across three continents.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2024–25<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">Multiverse<\u002Fdiv>\n        <div class=\"work-role\">VP, Global Sales Enablement<\u002Fdiv>\n        <div class=\"work-note\">Led enablement for 1,500 people across the US, UK, and Europe, supporting ~$300M in revenue.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2020–24<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">Figma<\u002Fdiv>\n        <div class=\"work-role\">Head of Global Sales Enablement<\u002Fdiv>\n        <div class=\"work-note\">First enablement hire. Built the global onboarding architecture from nothing — ramp from 8 months to 4.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2019–20<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">ByteDance<\u002Fdiv>\n        <div class=\"work-role\">Director, Sales Enablement<\u002Fdiv>\n        <div class=\"work-note\">Onboarding for 400+ across APAC and NAMER, post-Musically acquisition.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2015–19<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">Couchbase<\u002Fdiv>\n        <div class=\"work-role\">Senior Manager, Sales Enablement<\u002Fdiv>\n        <div class=\"work-note\">Enterprise onboarding and product training across NAMER, APAC, and EMEA.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-item\">\n      <div class=\"work-year\">2013–15<\u002Fdiv>\n      <div>\n        <div class=\"work-co\">TubeMogul (Adobe)<\u002Fdiv>\n        <div class=\"work-role\">Client Training<\u002Fdiv>\n        <div class=\"work-note\">First training hire pre-IPO. Built certification later deployed globally across Adobe.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><\u002Fsection>\n\n    <\u002Fdiv>\n  \n  <footer>\n    <span>LHR<\u002Fspan> · <span>DEL<\u002Fspan> · <span>LAX<\u002Fspan>\n  <\u002Ffooter>\n\n\n\n<script>\n// Open section from tagline\nfunction openSection(which) {\n  const body = document.getElementById(which + '-body');\n  if (body) body.style.display = '';\n  const el = document.getElementById(which);\n  if (el) window.scrollTo({top: el.offsetTop - 32, behavior: 'smooth'});\n}\n\n// Dark mode\nconst saved = localStorage.getItem('rp-dark');\nlet dark = saved !== null ? saved === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;\nfunction applyDark(d) {\n  document.body.classList.toggle('dark', d);\n  document.getElementById('moon-icon').style.display = d ? 'none' : '';\n  document.getElementById('sun-icon').style.display = d ? '' : 'none';\n}\napplyDark(dark);\ndocument.getElementById('dark-toggle').addEventListener('click', () => {\n  dark = !dark;\n  localStorage.setItem('rp-dark', dark);\n  applyDark(dark);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
